name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-macos:
    name: 构建 macOS Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SkiLens ${{ github.ref_name }}"
          releaseBody: "发布说明见 CHANGELOG.md。"
          releaseDraft: true
          prerelease: true

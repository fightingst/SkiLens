name: 功能建议
description: 为 SkiLens 提出改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 这个功能想解决什么工作流或痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 SkiLens 怎么做？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
  - type: checkboxes
    id: scope
    attributes:
      label: 影响范围
      options:
        - label: 这会改变扫描器行为。
        - label: 这会改变删除或归档行为。
        - label: 这会改变本地数据存储。
        - label: 这只是 UI 改动。

name: Bug 反馈
description: 报告 SkiLens 中可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。提交前请移除私密提示词、本地路径、客户名和原始日志。
  - type: input
    id: version
    attributes:
      label: SkiLens 版本
      description: Release 版本或 commit SHA。
      placeholder: "0.1.0 或 abc1234"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS 版本
      placeholder: "14.6"
    validations:
      required: true
  - type: dropdown
    id: build_type
    attributes:
      label: 构建类型
      options:
        - GitHub Release DMG
        - 本地 tauri dev
        - 本地 tauri build
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图或已脱敏日志
      description: 请不要粘贴未脱敏的原始日志。
